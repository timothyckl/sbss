name: Publish

on:
  push:
    branches: [main]

# needed to push the version-bump commit back to main
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/

  publish:
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # use GITHUB_TOKEN so the push step is authorised
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump patch version in pyproject.toml
        id: bump
        run: |
          python - <<'EOF'
          import re

          path = "pyproject.toml"
          content = open(path).read()

          # extract current version components
          m = re.search(r'version = "(\d+)\.(\d+)\.(\d+)"', content)
          if not m:
              raise SystemExit("could not find version string in pyproject.toml")

          major, minor, patch = m.groups()
          new_version = f"{major}.{minor}.{int(patch) + 1}"

          # write bumped version back to file
          updated = re.sub(
              r'version = "\d+\.\d+\.\d+"',
              f'version = "{new_version}"',
              content,
          )
          open(path, "w").write(updated)
          print(f"bumped version to {new_version}")
          EOF

          # capture new version for later steps
          python -c "
          import re
          m = re.search(r'version = \"(\d+\.\d+\.\d+)\"', open('pyproject.toml').read())
          print('new_version=' + m.group(1))
          " >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Build distribution
        run: |
          pip install build -q
          python -m build

      - name: Publish to PyPI
        run: |
          pip install twine -q
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_API_TOKEN }}
